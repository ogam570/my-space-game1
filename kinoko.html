<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>きのこの世界 ブロック崩し</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a1f0a;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas {
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') center/cover no-repeat;
      /* またはDreamstime風のものを使う場合例: https://thumbs.dreamstime.com/b/enchanted-mushroom-forest-glade-vibrant-whimsical-digital-illustration-depicts-magical-forest-scene-teeming-colorful-397308524.jpg */
      border: 3px solid #8b4513;
      box-shadow: 0 0 30px rgba(255,200,0,0.4);
    }
    #info {
      position: absolute;
      top: 15px;
      left: 20px;
      color: #ffeb3b;
      font-size: 20px;
      text-shadow: 0 0 8px #8b4513, 0 0 15px #ff9800;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="info">きのこ残り: <span id="blockCount">0</span>　　スコア: <span id="score">0</span></div>

<canvas id="gameCanvas" width="480" height="640"></canvas>

<script>
// === メイン処理 ===
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0;
let gameOver = false;
let cleared = false;

// パドル（きのこの幹っぽく）
const paddle = {
  x: canvas.width / 2 - 60,
  y: canvas.height - 35,
  width: 120,
  height: 18,
  speed: 8,
  dx: 0
};

// ボール（きのこボール！）
const ball = {
  x: canvas.width / 2,
  y: canvas.height - 90,
  radius: 14,
  speed: 5,
  dx: 3.2,
  dy: -3.2
};

// ブロック（きのこっぽい色合い）
const blockRowCount = 5;
const blockColumnCount = 8;
const blockWidth = 50;
const blockHeight = 22;
const blockPadding = 12;
const blockOffsetTop = 50;
const blockOffsetLeft = (canvas.width - (blockColumnCount * (blockWidth + blockPadding) - blockPadding)) / 2;

let blocks = [];

function createBlocks() {
  blocks = [];
  for (let c = 0; c < blockColumnCount; c++) {
    blocks[c] = [];
    for (let r = 0; r < blockRowCount; r++) {
      blocks[c][r] = { x: 0, y: 0, status: 1 };
    }
  }
}

createBlocks();
updateBlockCount();

// キー・マウス入力
let rightPressed = false;
let leftPressed = false;

document.addEventListener("keydown", keyDownHandler);
document.addEventListener("keyup", keyUpHandler);
document.addEventListener("mousemove", mouseMoveHandler);

function keyDownHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
  else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
  if ((e.key === " " || e.key === "Enter") && (gameOver || cleared)) {
    resetGame();
  }
}

function keyUpHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
  else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
}

function mouseMoveHandler(e) {
  const relativeX = e.clientX - canvas.offsetLeft;
  if (relativeX > 0 && relativeX < canvas.width) {
    paddle.x = relativeX - paddle.width / 2;
  }
}

function resetGame() {
  score = 0;
  gameOver = false;
  cleared = false;
  ball.x = canvas.width / 2;
  ball.y = canvas.height - 90;
  ball.dx = 3.2;
  ball.dy = -3.2;
  paddle.x = canvas.width / 2 - paddle.width / 2;
  createBlocks();
  updateBlockCount();
  updateScore();
  draw();
}

// 描画関数
function drawPaddle() {
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 10);
  ctx.fillStyle = "#4caf50"; // 緑の幹っぽく
  ctx.shadowBlur = 15;
  ctx.shadowColor = "#8bc34a";
  ctx.fill();
  ctx.closePath();

  // 上部にきのこの傘っぽい赤を少し
  ctx.beginPath();
  ctx.roundRect(paddle.x + 10, paddle.y - 8, paddle.width - 20, 12, 8);
  ctx.fillStyle = "#f44336";
  ctx.shadowBlur = 12;
  ctx.shadowColor = "#ff5722";
  ctx.fill();
  ctx.closePath();
}

function drawMushroomBall() {
  const x = ball.x;
  const y = ball.y;
  const r = ball.radius;

  // 白い本体（きのこの足）
  ctx.beginPath();
  ctx.arc(x, y, r * 0.85, 0, Math.PI * 2);
  ctx.fillStyle = "#ffffff";
  ctx.shadowBlur = 20;
  ctx.shadowColor = "#ffffff";
  ctx.fill();
  ctx.closePath();

  // 赤い傘部分
  ctx.beginPath();
  ctx.arc(x, y - r * 0.3, r * 1.1, 0, Math.PI * 2);
  ctx.fillStyle = "#d32f2f";
  ctx.shadowBlur = 25;
  ctx.shadowColor = "#f44336";
  ctx.fill();
  ctx.closePath();

  // 白い斑点（3〜4個）
  const spots = [
    {dx: -0.4, dy: -0.5}, {dx: 0.5, dy: -0.6},
    {dx: -0.1, dy: 0.1}, {dx: 0.4, dy: 0.0}
  ];
  spots.forEach(s => {
    ctx.beginPath();
    ctx.arc(x + r * s.dx, y - r * 0.3 + r * s.dy, r * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.closePath();
  });
}

function drawBlocks() {
  for (let c = 0; c < blockColumnCount; c++) {
    for (let r = 0; r < blockRowCount; r++) {
      if (blocks[c][r].status === 1) {
        const blockX = c * (blockWidth + blockPadding) + blockOffsetLeft;
        const blockY = r * (blockHeight + blockPadding) + blockOffsetTop;
        blocks[c][r].x = blockX;
        blocks[c][r].y = blockY;

        ctx.beginPath();
        ctx.roundRect(blockX, blockY, blockWidth, blockHeight, 8);

        // きのこカラーパレット
        const colors = ["#f44336", "#ff9800", "#ffeb3b", "#8bc34a", "#00bcd4"];
        const color = colors[r % colors.length];
        
        ctx.fillStyle = color;
        ctx.shadowBlur = 12;
        ctx.shadowColor = color;

        ctx.fill();
        ctx.closePath();

        // 小さな白斑点できのこ感をプラス
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(blockX + blockWidth*0.3, blockY + blockHeight*0.4, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(blockX + blockWidth*0.7, blockY + blockHeight*0.6, 4, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBlocks();
  drawPaddle();
  drawMushroomBall();

  if (gameOver) {
    ctx.font = "bold 50px Arial";
    ctx.fillStyle = "#ff5722";
    ctx.textAlign = "center";
    ctx.fillText("きのこが落ちちゃった…", canvas.width/2, canvas.height/2);
    ctx.font = "24px Arial";
    ctx.fillStyle = "#fff9c4";
    ctx.fillText("スペースキー or クリックで もういっかい！", canvas.width/2, canvas.height/2 + 60);
  }

  if (cleared) {
    ctx.font = "bold 50px Arial";
    ctx.fillStyle = "#8bc34a";
    ctx.textAlign = "center";
    ctx.fillText("きのこ王国クリア！", canvas.width/2, canvas.height/2);
    ctx.font = "28px Arial";
    ctx.fillStyle = "#ffeb3b";
    ctx.fillText("スコア: " + score, canvas.width/2, canvas.height/2 + 60);
    ctx.fillStyle = "#fff9c4";
    ctx.fillText("スペースキー or クリックで 次へ！", canvas.width/2, canvas.height/2 + 110);
  }
}

function collisionDetection() {
  for (let c = 0; c < blockColumnCount; c++) {
    for (let r = 0; r < blockRowCount; r++) {
      const b = blocks[c][r];
      if (b.status === 1) {
        if (
          ball.x + ball.radius > b.x &&
          ball.x - ball.radius < b.x + blockWidth &&
          ball.y + ball.radius > b.y &&
          ball.y - ball.radius < b.y + blockHeight
        ) {
          ball.dy = -ball.dy;
          b.status = 0;
          score += 20; // きのこを救うと高得点！
          updateScore();
          updateBlockCount();

          if (getRemainingBlocks() === 0) {
            cleared = true;
          }
        }
      }
    }
  }
}

function getRemainingBlocks() {
  let count = 0;
  blocks.forEach(col => col.forEach(b => { if (b.status === 1) count++; }));
  return count;
}

function updateBlockCount() {
  document.getElementById("blockCount").textContent = getRemainingBlocks();
}

function updateScore() {
  document.getElementById("score").textContent = score;
}

function move() {
  if (gameOver || cleared) return;

  // パドル移動
  if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
  if (leftPressed && paddle.x > 0) paddle.x -= paddle.speed;

  // ボール移動
  ball.x += ball.dx;
  ball.y += ball.dy;

  // 壁
  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) ball.dx = -ball.dx;
  if (ball.y - ball.radius < 0) ball.dy = -ball.dy;

  // パドル衝突（きのこボールが跳ねる）
  if (
    ball.y + ball.radius > paddle.y &&
    ball.y - ball.radius < paddle.y + paddle.height &&
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width
  ) {
    ball.dy = -Math.abs(ball.dy);
    const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
    ball.dx += hitPos * 3.5;
  }

  // 底落ち
  if (ball.y + ball.radius > canvas.height) {
    gameOver = true;
  }

  collisionDetection();
}

function mainLoop() {
  move();
  draw();
  requestAnimationFrame(mainLoop);
}

mainLoop();
updateScore();

</script>
</body>
</html>
